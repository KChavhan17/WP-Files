<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>
  <style>
    body    { background:black; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
    .box    { background:#111; border:1px solid gray; border-radius:12px; padding:30px 24px; width:100%; max-width:360px; }
    h2      { color:gold; text-align:center; margin-bottom:24px; }
    label   { display:block; color:gray; font-size:13px; margin-bottom:6px; }
    input   { width:100%; background:black; border:1px solid gray; color:white; padding:10px; border-radius:8px; font-size:16px; margin-bottom:16px; box-sizing:border-box; }
    button  { background:gold; color:black; border:none; width:100%; padding:12px; border-radius:8px; font-weight:700; font-size:16px; cursor:pointer; }
    #r      { display:none; text-align:center; margin-top:24px; border-top:1px solid gray; padding-top:20px; }
    #bmi    { font-size:56px; font-weight:800; color:gold; }
    #lb     { font-size:18px; font-weight:600; margin-top:6px; }
    #inf    { color:gray; font-size:13px; margin-top:6px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>⚖️ BMI Calculator</h2>

    <label>Weight (kg)</label>
    <input type="number" id="w" placeholder="e.g. 60"/>

    <label>Height (cm)</label>
    <input type="number" id="h" placeholder="e.g. 165"/>

    <button onclick="calc()">Calculate BMI</button>

    <div id="r">
      <div id="bmi"></div>
      <div id="lb"></div>
      <div id="inf"></div>
    </div>
  </div>

  <script>
    function calc() {
      var w=Number(document.getElementById('w').value);
      var h=Number(document.getElementById('h').value)/100;
      if(!w||!h){ alert('Enter both values!'); return; }
      var b=(w/(h*h)).toFixed(1), lb, inf;
      if(b<18.5)    { lb="Underweight 🥺"; inf="Eat more nutritious food!"; }
      else if(b<25) { lb="Normal ✅";      inf="Great! Keep it up!"; }
      else if(b<30) { lb="Overweight ⚠️"; inf="Exercise more!"; }
      else          { lb="Obese 🚨";       inf="Consult a doctor!"; }
      document.getElementById('bmi').textContent = b;
      document.getElementById('lb').textContent  = lb;
      document.getElementById('inf').textContent = inf;
      document.getElementById('r').style.display = 'block';
    }
  </script>
</body>
</html>
