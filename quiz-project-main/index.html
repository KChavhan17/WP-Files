<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <style>
    body { background:#111; color:white; font-family:sans-serif; text-align:center; padding:30px 20px; }
    h2   { color:#facc15; margin-bottom:20px; }
    .question { font-size:18px; margin-bottom:20px; }
    button {
      display:block; width:100%; background:#1e1e1e;
      color:white; border:1px solid #333; padding:12px;
      border-radius:10px; font-size:15px; cursor:pointer;
      margin-bottom:10px; transition:0.2s;
    }
    button:hover { background:#facc15; color:#111; }
    #result { font-size:20px; font-weight:bold; margin-top:20px; }
    #score  { color:#00e5ff; font-size:18px; margin-top:10px; }
  </style>
</head>
<body>

  <h2>🧠 Quiz App</h2>
  <div class="question" id="question"></div>
  <div id="options"></div>
  <div id="result"></div>
  <div id="score"></div>

  <script>
    var questions = [
      { q: "What does HTML stand for?", options: ["Hyper Text Markup Language", "High Tech Modern Language", "Hyper Transfer Mode Link", "None"], answer: 0 },
      { q: "Which tag is used for links?", options: ["link tag", "a tag", "href tag", "url tag"], answer: 1 },
      { q: "What does CSS stand for?", options: ["Computer Style Sheets", "Creative Style System", "Cascading Style Sheets", "None"], answer: 2 },
      { q: "Which is used for logic in web?", options: ["HTML", "CSS", "JavaScript", "PHP"], answer: 2 }
    ];

    var current = 0;
    var score   = 0;

    function loadQuestion() {
      if (current >= questions.length) {
        document.getElementById("question").textContent = "Quiz Complete! 🎉";
        document.getElementById("options").innerHTML = "";
        document.getElementById("score").textContent = "Your Score: " + score + "/" + questions.length;
        return;
      }
      var q = questions[current];
      document.getElementById("question").textContent = (current+1) + ". " + q.q;
      document.getElementById("result").textContent = "";
      var html = "";
      for (var i = 0; i < q.options.length; i++) {
        html += '<button onclick="check(' + i + ')">' + q.options[i] + '</button>';
      }
      document.getElementById("options").innerHTML = html;
    }

    function check(selected) {
      var q = questions[current];
      if (selected === q.answer) {
        document.getElementById("result").textContent = "✅ Correct!";
        document.getElementById("result").style.color = "#00ff88";
        score++;
      } else {
        document.getElementById("result").textContent = "❌ Wrong!";
        document.getElementById("result").style.color = "#ff4466";
      }
      current++;
      setTimeout(loadQuestion, 1000);
    }

    loadQuestion();
  </script>

</body>
</html>
